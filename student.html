<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainFitBit - Student Training</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .container { 
            max-width: 1000px; 
            width: 100%; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
            margin-top: 20px;
        }

        h1 { 
            color: var(--primary); 
            text-align: center; 
            margin-bottom: 8px; 
            font-size: 2rem;
        }

        .subtitle { 
            text-align: center; 
            color: #64748b; 
            margin-bottom: 40px; 
            font-size: 1.1rem;
        }

        /* Tabela de Exercícios */
        .table-scroll { 
            overflow-x: auto; 
            margin-bottom: 30px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
        }

        table { 
            border-collapse: collapse; 
            width: 100%; 
            background: white; 
            min-width: 600px; 
        }

        td { 
            border: 1px solid #f1f5f9; 
            padding: 18px 12px; 
            text-align: center; 
            font-size: 26px; 
            font-weight: 700; 
            color: #334155;
        }

        tr:nth-child(even) { background: #f8fafc; }
        
        /* Estilo dos Inputs */
        .answer-input { 
            width: 85%; 
            padding: 12px; 
            border: 2px solid #cbd5e1; 
            border-radius: 8px; 
            text-align: center; 
            font-size: 22px; 
            font-weight: bold; 
            color: var(--primary);
            transition: all 0.2s;
        }

        .answer-input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Estados de Resposta */
        .correct { 
            background: #dcfce7 !important; 
            border-color: var(--success) !important; 
            color: #065f46 !important; 
        }

        .wrong { 
            background: #fee2e2 !important; 
            border-color: var(--danger) !important; 
            color: #991b1b !important; 
        }

        /* Botões e Ações */
        .actions { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 30px; 
            flex-wrap: wrap; 
        }

        button { 
            padding: 14px 32px; 
            font-size: 1rem; 
            font-weight: 600; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .btn-check { background: var(--primary); color: white; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        .btn-download { background: #475569; color: white; }
        .btn-print { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }

        #result-summary { 
            text-align: center; 
            font-size: 1.75rem; 
            font-weight: 800; 
            margin-top: 30px; 
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        /* Ajustes para impressão */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; padding: 0; }
            .actions, button { display: none !important; }
            td { font-size: 20px; padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="welcome-msg">Soroban Training</h1>
    <p class="subtitle" id="config-info">Analyzing parameters...</p>

    <div class="table-scroll">
        <table>
            <tbody id="table-body"></tbody>
            <tfoot id="table-foot"></tfoot>
        </table>
    </div>

    <div class="actions" id="action-area">
        <button class="btn-check" onclick="checkAnswers()">Verify My Answers</button>
    </div>

    <div id="result-summary"></div>

    <div class="actions" id="post-action-area" style="display:none;">
        <button class="btn-download" onclick="downloadJSON()">💾 Save JSON for Teacher</button>
        <button class="btn-print" onclick="window.print()">🖨️ Print Results</button>
        <button class="btn-check" onclick="location.reload()" style="background:#6366f1">🔄 New Session</button>
    </div>
</div>

<script>
    let homeworkData = [];
    const params = new URLSearchParams(window.location.search);
    
    const config = {
        student: params.get('student') || "Student",
        method: params.get('method') || "Simple",
        cols: Math.max(1, parseInt(params.get('cols')) || 1),
        rows: Math.max(2, parseInt(params.get('rows')) || 5),
        q: Math.max(1, parseInt(params.get('q')) || 5)
    };

    document.getElementById('welcome-msg').innerText = `Keep going, ${config.student}!`;
    document.getElementById('config-info').innerText = `Method: ${config.method} | Columns: ${config.cols} | Questions: ${config.q}`;

    // --- LÓGICA DE SOROBAN (IDENTICA AO SEU TRAINER) ---

    function generateFullNumber(maxColumns) {
        let num = 0;
        for (let i = 0; i < maxColumns; i++) {
            let digit = Math.floor(Math.random() * 10);
            if (i === maxColumns - 1 && maxColumns > 1 && digit === 0) digit = 1;
            num += digit * Math.pow(10, i);
        }
        return num;
    }

    function validMove(total, num, method, op) {
        let newTotal = op === 1 ? total + num : total - num;
        if (newTotal < 0) return false;
        if (method === "All") return true;

        for (let i = 0; i < 13; i++) {
            let p = Math.pow(10, i);
            let dTotal = Math.floor((total / p) % 10);
            let dNum = Math.floor((num / p) % 10);
            if (dNum === 0) continue; 

            let hasFive = dTotal >= 5;
            let lowerBeads = dTotal % 5;

            if (op === 1) { // Adição
                let isSimple = (dNum <= (4 - lowerBeads)) || (dNum >= 5 && !hasFive && (dNum - 5 <= 4 - lowerBeads));
                let isSmall = (dNum < 5) && (dNum > (4 - lowerBeads)) && !hasFive;
                let isBig = (dTotal + dNum >= 10);
                let isMixed = isBig && ((dTotal + dNum) % 10 < 5) && !hasFive;

                if (method === "Simple") { if (!isSimple || isBig) return false; }
                else if (method === "Small Friend") {
                    if (isBig) return false;
                    if (!isSmall && !isSimple) return false;
                }
                else if (method === "Big Friend") { 
                    if (!isBig && !isSimple) return false;
                    if (isMixed) return false;
                }
                else if (method === "Mixed") { if (!isMixed && !isSimple) return false; }
            } 
            else { // Subtração
                let isSimpleSub = (dNum <= lowerBeads) || (dNum >= 5 && hasFive && (dNum - 5 <= lowerBeads));
                let isSmallSub = (dNum < 5) && (dNum > lowerBeads) && hasFive;
                let isBigSub = (dTotal < dNum);
                let isMixedSub = isBigSub && (dNum > 5) && (dTotal < 5);

                if (method === "Simple") { if (!isSimpleSub || isBigSub) return false; }
                else if (method === "Small Friend") {
                    if (isBigSub) return false;
                    if (!isSmallSub && !isSimpleSub) return false;
                }
                else if (method === "Big Friend") { if (!isBigSub && !isSimpleSub) return false; }
                else if (method === "Mixed") { if (!isMixedSub && !isSimpleSub) return false; }
            }
        }
        return true;
    }

    function initHomework() {
        homeworkData = [];
        for (let i = 0; i < config.q; i++) {
            let moves = [], currentTotal = 0;
            for (let r = 0; r < config.rows; r++) {
                let num, sign, valid = false, tries = 0;
                while (!valid && tries < 1500) {
                    num = generateFullNumber(config.cols);
                    sign = (r === 0) ? 1 : (Math.random() < 0.5 ? 1 : -1);
                    valid = validMove(currentTotal, num, config.method, sign);
                    tries++;
                }
                if (!valid) { num = 1; sign = (currentTotal > 0) ? -1 : 1; }
                moves.push(sign * num);
                currentTotal += (sign * num);
            }
            homeworkData.push({ moves, total: currentTotal, studentAnswer: null });
        }
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        const tfoot = document.getElementById('table-foot');
        
        let bodyHtml = "";
        for (let r = 0; r < config.rows; r++) {
            bodyHtml += "<tr>";
            for (let q = 0; q < config.q; q++) {
                let v = homeworkData[q].moves[r];
                let display = (r === 0) ? Math.abs(v) : (v < 0 ? "-" + Math.abs(v) : "+" + v);
                bodyHtml += `<td>${display}</td>`;
            }
            bodyHtml += "</tr>";
        }
        tbody.innerHTML = bodyHtml;

        let footHtml = "<tr>";
        for (let q = 0; q < config.q; q++) {
            footHtml += `<td><input type="number" class="answer-input" id="ans-${q}" placeholder="?"></td>`;
        }
        footHtml += "</tr>";
        tfoot.innerHTML = footHtml;
    }

    function checkAnswers() {
        let correctCount = 0;
        homeworkData.forEach((item, i) => {
            const input = document.getElementById(`ans-${i}`);
            const val = parseInt(input.value);
            item.studentAnswer = val;
            input.disabled = true;

            if (val === item.total) {
                input.classList.add('correct');
                correctCount++;
            } else {
                input.classList.add('wrong');
                input.value = `${val || 0} (${item.total})`;
            }
        });

        const summary = document.getElementById('result-summary');
        summary.innerText = `Result: ${correctCount} / ${config.q}`;
        summary.style.display = "block";
        summary.style.background = correctCount === config.q ? '#dcfce7' : '#f1f5f9';
        summary.style.color = correctCount === config.q ? '#166534' : '#1e293b';
        
        document.getElementById('action-area').style.display = "none";
        document.getElementById('post-action-area').style.display = "flex";
    }

    function downloadJSON() {
        const exportData = homeworkData.map(item => ({
            moves: item.moves.map(m => [m]),
            total: item.total,
            studentAnswers: [item.studentAnswer]
        }));

        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Results_${config.student}.json`;
        a.click();
    }

    window.onload = initHomework;
</script>

</body>
</html>
