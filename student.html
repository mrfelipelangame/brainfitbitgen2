<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student - BrainFitBit</title>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 450px; width: 100%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }
        
        /* Estilo das imagens */
        .header-img { width: 190px; height: auto; margin-bottom: 10px; border-radius: 10px; }
        .final-img { width: 250px; height: auto; margin: 20px 0; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        #timer { font-size: 1.5rem; font-weight: 800; color: var(--danger); border: 2px solid #eee; display: inline-block; padding: 5px 20px; border-radius: 20px; margin-bottom: 15px; min-width: 80px; }
        .nums { font-size: 40px; font-weight: bold; margin: 20px 0; line-height: 1.2; }
        input { width: 100%; padding: 15px; font-size: 24px; text-align: center; border: 3px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-save { background: var(--success); display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>
<div class="container" id="box">
    <div id="header-area">
        <img src="CapibaraHW.png" alt="Studying..." class="header-img">
    </div>

    <div id="timer">00:00</div>
    <h2 id="name-tag" style="margin-top:0;">Student</h2>

    <div id="game">
        <p id="q-count">Question 1</p>
        <div class="nums" id="display"></div>
        <input type="number" id="ans" placeholder="Answer" autofocus>
        <button onclick="next()">Next Question</button>
    </div>

    <div id="finish" style="display:none">
        <h3 id="score"></h3>
        <button class="btn-save" onclick="save()">💾 Download for Teacher</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const cfg = { 
        name: params.get('student') || 'Student', 
        q: parseInt(params.get('q')) || 5,
        rows: parseInt(params.get('rows')) || 5,
        cols: parseInt(params.get('cols')) || 2,
        timer: params.get('timer') !== 'false'
    };

    let data = [], idx = 0, start = Date.now();
    let timerInterval;

    function init() {
        document.getElementById('name-tag').innerText = cfg.name;
        if(!cfg.timer) document.getElementById('timer').style.display = 'none';
        
        const saved = localStorage.getItem('hw_cache');
        if(saved) {
            data = JSON.parse(saved);
        } else {
            for(let i=0; i<cfg.q; i++) {
                let m = [], t = 0;
                for(let r=0; r<cfg.rows; r++) {
                    let n = Math.floor(Math.random() * Math.pow(10, cfg.cols)) || 1;
                    let s = (r===0) ? 1 : (Math.random() > 0.5 ? 1 : -1);
                    m.push([s * n]); t += (s * n);
                }
                data.push({ moves: m, total: t, studentAnswers: [] });
            }
            localStorage.setItem('hw_cache', JSON.stringify(data));
        }
        render();

        timerInterval = setInterval(() => {
            const d = Math.floor((Date.now()-start)/1000);
            document.getElementById('timer').innerText = `${Math.floor(d/60).toString().padStart(2,'0')}:${(d%60).toString().padStart(2,'0')}`;
        }, 1000);
    }

    function render() {
        document.getElementById('q-count').innerText = `Question ${idx+1} of ${cfg.q}`;
        document.getElementById('display').innerHTML = data[idx].moves.map((m,i) => `<div>${i>0 && m[0]>0 ? '+'+m[0] : m[0]}</div>`).join('');
        document.getElementById('ans').value = ''; document.getElementById('ans').focus();
    }

    function next() {
        const val = document.getElementById('ans').value;
        if(!val) return;
        data[idx].studentAnswers = [parseInt(val)];
        
        if(++idx < cfg.q) {
            render();
        } else {
            clearInterval(timerInterval);
            document.getElementById('game').style.display = 'none';
            document.getElementById('finish').style.display = 'block';
            localStorage.removeItem('hw_cache');
            const correct = data.filter(x => x.studentAnswers[0] === x.total).length;
            document.getElementById('score').innerText = `Completed! Score: ${correct}/${cfg.q}`;
        }
    }

    function save() {
        data[0].time = document.getElementById('timer').innerText;
        const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Results_${cfg.name}.json`; a.click();
        
        // --- MENSAGEM FINAL COM IMAGEM (CapiDidIt.png) ---
        document.getElementById('box').innerHTML = `
            <img src="CapiDidIt.png" alt="Mission Accomplished" class="final-img">
            <h2 style="color: var(--primary);">You done your homework, you're awesome!</h2>
            <p>See you!</p>
        `;
    }
    window.onload = init;
</script>
</body>
</html>
