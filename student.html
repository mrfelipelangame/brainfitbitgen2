<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainFitBit - Student Training</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        .container { 
            max-width: 500px; 
            width: 100%; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
            margin-top: 20px;
            text-align: center;
        }

        /* Estilo do Cronômetro/Stopwatch */
        #timer-pill {
            background: white;
            padding: 10px 25px;
            border-radius: 30px;
            border: 2px solid #e2e8f0;
            font-weight: 800;
            color: var(--danger);
            margin: 0 auto 20px auto;
            display: table;
            font-size: 1.4rem;
            font-variant-numeric: tabular-nums;
        }

        h1 { color: var(--primary); margin-bottom: 8px; font-size: 1.8rem; }
        .subtitle { color: #64748b; margin-bottom: 30px; font-size: 0.9rem; }

        .question-card {
            background: #f8fafc;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 25px;
        }

        .number-list {
            font-size: 45px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 20px;
            color: #1e293b;
        }

        .answer-input { 
            width: 80%; 
            padding: 15px; 
            border: 3px solid #cbd5e1; 
            border-radius: 10px; 
            text-align: center; 
            font-size: 32px; 
            font-weight: bold; 
            color: var(--primary);
            outline: none;
        }

        .answer-input:focus { border-color: var(--primary); }

        .progress-bar {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 10px;
            font-weight: 600;
        }

        button { 
            padding: 16px 40px; 
            font-size: 1.1rem; 
            font-weight: 700; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s;
            width: 100%;
        }

        .btn-next { background: var(--primary); color: white; }
        .btn-save { background: #475569; color: white; margin-top: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        #final-msg {
            display: none;
            padding: 40px 10px;
        }

        #final-msg h2 { color: var(--primary); font-size: 1.8rem; margin-bottom: 10px; }
        #final-msg p { color: #64748b; font-size: 1.2rem; }

        .result-box {
            font-size: 1.5rem;
            font-weight: 800;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            background: #f1f5f9;
        }
    </style>
</head>
<body>

<div class="container" id="content-wrap">
    <div id="ui-elements">
        <div id="timer-pill">00:00</div>
        
        <h1 id="welcome-msg">Soroban Training</h1>
        <p class="subtitle" id="config-info">Loading session...</p>

        <div id="game-section">
            <div class="progress-bar" id="progress-text">Question 1 of 5</div>
            <div class="question-card">
                <div class="number-list" id="display-numbers"></div>
                <input type="number" id="input-ans" class="answer-input" placeholder="?" autofocus>
            </div>
            <button class="btn-next" id="action-btn" onclick="handleStep()">Next Question</button>
        </div>

        <div id="result-area" style="display:none;">
            <div class="result-box" id="score-text"></div>
            <button class="btn-save" onclick="generatePDFReport()">🖨️ Save PDF for Teacher</button>
        </div>
    </div>

    <div id="final-msg">
        <h2>You done your homework, you're awesome!</h2>
        <p>See you!</p>
    </div>
</div>

<script>
    let homeworkData = [];
    let currentIdx = 0;
    let startTime, timerInterval;
    let totalSeconds = 0;

    const params = new URLSearchParams(window.location.search);
    const config = {
        student: params.get('student') || "Student",
        method: params.get('method') || "Simple",
        cols: Math.max(1, parseInt(params.get('cols')) || 1),
        rows: Math.max(2, parseInt(params.get('rows')) || 5),
        q: Math.max(1, parseInt(params.get('q')) || 5)
    };

    function generateFullNumber(maxCols) {
        let num = 0;
        for (let i = 0; i < maxCols; i++) {
            let digit = Math.floor(Math.random() * 10);
            if (i === maxCols - 1 && maxCols > 1 && digit === 0) digit = 1;
            num += digit * Math.pow(10, i);
        }
        return num;
    }

    function validMove(total, num, method, op) {
        let newTotal = op === 1 ? total + num : total - num;
        if (newTotal < 0) return false;
        if (method === "All") return true;
        for (let i = 0; i < 13; i++) {
            let p = Math.pow(10, i);
            let dTotal = Math.floor((total/p)%10), dNum = Math.floor((num/p)%10);
            if (dNum === 0) continue;
            let hasFive = dTotal >= 5, lower = dTotal % 5;
            if (op === 1) {
                let simple = (dNum <= (4-lower)) || (dNum >= 5 && !hasFive && (dNum-5 <= 4-lower));
                let small = (dNum < 5) && (dNum > (4-lower)) && !hasFive;
                let big = (dTotal + dNum >= 10);
                let mixed = big && ((dTotal+dNum)%10 < 5) && !hasFive;
                if (method === "Simple" && (!simple || big)) return false;
                if (method === "Small Friend" && (big || (!small && !simple))) return false;
                if (method === "Big Friend" && ((!big && !simple) || mixed)) return false;
                if (method === "Mixed" && (!mixed && !simple)) return false;
            } else {
                let simpleSub = (dNum <= lower) || (dNum >= 5 && hasFive && (dNum-5 <= lower));
                let smallSub = (dNum < 5) && (dNum > lower) && hasFive;
                let bigSub = (dTotal < dNum);
                let mixedSub = bigSub && (dNum > 5) && (dTotal < 5);
                if (method === "Simple" && (!simpleSub || bigSub)) return false;
                if (method === "Small Friend" && (bigSub || (!smallSub && !simpleSub))) return false;
                if (method === "Big Friend" && (!bigSub && !simpleSub)) return false;
                if (method === "Mixed" && (!mixedSub && !simpleSub)) return false;
            }
        }
        return true;
    }

    function init() {
        const saved = localStorage.getItem('active_hw');
        if (saved) {
            homeworkData = JSON.parse(saved);
        } else {
            for (let i = 0; i < config.q; i++) {
                let moves = [], total = 0;
                for (let r = 0; r < config.rows; r++) {
                    let n, s, v = false, t = 0;
                    while (!v && t < 1000) {
                        n = generateFullNumber(config.cols);
                        s = (r === 0) ? 1 : (Math.random() < 0.5 ? 1 : -1);
                        v = validMove(total, n, config.method, s);
                        t++;
                    }
                    moves.push(s * n);
                    total += (s * n);
                }
                homeworkData.push({ moves, total, studentAnswer: null });
            }
            localStorage.setItem('active_hw', JSON.stringify(homeworkData));
        }
        
        document.getElementById('welcome-msg').innerText = `Keep going, ${config.student}!`;
        document.getElementById('config-info').innerText = `${config.method} | ${config.cols} Columns`;
        
        showQuestion();
        // Inicia o Stopwatch
        startTime = Date.now();
        timerInterval = setInterval(updateStopwatch, 1000);
    }

    function updateStopwatch() {
        totalSeconds = Math.floor((Date.now() - startTime) / 1000);
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;
        document.getElementById('timer-pill').innerText = 
            `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function showQuestion() {
        const q = homeworkData[currentIdx];
        document.getElementById('progress-text').innerText = `Question ${currentIdx + 1} of ${config.q}`;
        document.getElementById('display-numbers').innerHTML = q.moves.map((m, i) => 
            `<div>${(i === 0) ? Math.abs(m) : (m > 0 ? '+' + m : m)}</div>`
        ).join('');
        document.getElementById('input-ans').value = "";
        document.getElementById('input-ans').focus();
        
        if (currentIdx === config.q - 1) document.getElementById('action-btn').innerText = "Finish Homework";
    }

    function handleStep() {
        const val = document.getElementById('input-ans').value;
        if (val === "") return alert("Please enter your answer!");
        
        homeworkData[currentIdx].studentAnswer = parseInt(val);
        
        if (currentIdx < config.q - 1) {
            currentIdx++;
            showQuestion();
        } else {
            finishSession();
        }
    }

    function finishSession() {
        clearInterval(timerInterval);
        localStorage.removeItem('active_hw');
        document.getElementById('game-section').style.display = "none";
        
        let correct = homeworkData.reduce((acc, curr) => acc + (curr.studentAnswer === curr.total ? 1 : 0), 0);
        document.getElementById('score-text').innerText = `Final Score: ${correct} / ${config.q}`;
        document.getElementById('result-area').style.display = "block";
    }

    // Função para gerar o PDF (mecanismo idêntico ao do index.html)
    function generatePDFReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const timeFinal = document.getElementById('timer-pill').innerText;
        
        doc.setFontSize(22);
        doc.text("BrainFitBit - Homework Report", 20, 20);
        
        doc.setFontSize(14);
        doc.text(`Student: ${config.student}`, 20, 35);
        doc.text(`Method: ${config.method}`, 20, 42);
        doc.text(`Total Time: ${timeFinal}`, 20, 49);
        
        let y = 65;
        doc.setFontSize(12);
        doc.text("Results:", 20, y);
        y += 10;

        homeworkData.forEach((item, index) => {
            const isCorrect = item.studentAnswer === item.total ? "CORRECT" : "WRONG";
            doc.text(`Q${index + 1}: Expected: ${item.total} | Answered: ${item.studentAnswer} [${isCorrect}]`, 20, y);
            y += 8;
            if (y > 280) { doc.addPage(); y = 20; }
        });

        doc.save(`Homework_${config.student}.pdf`);

        // Transição final
        document.getElementById('ui-elements').style.display = "none";
        document.getElementById('final-msg').style.display = "block";
    }

    window.onload = init;
</script>

</body>
</html>
