<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainFitBit - Teacher Dashboard</title>
    <style>
        body { 
            font-family: "Comic Sans MS", cursive, sans-serif; 
            background: #a0daf3; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Botões flutuantes no topo como na sua captura */
        .nav-buttons { position: fixed; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .nav-btn { padding: 10px 20px; border-radius: 8px; color: white; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 5px; }
        
        .dashboard-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 800px;
        }
        h1 { color: #2c3e50; font-size: 2.5rem; margin-bottom: 10px; }
        hr { border: 0; border-top: 1px solid #ccc; margin: 20px 0; }
        .btn-exit { background: #666; color: white; padding: 12px 35px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="nav-buttons">
        <a href="index.html" style="background: #5cb85c;" class="nav-btn">🏠 Home</a>
        <a href="#" style="background: #d9534f;" class="nav-btn">🔑 Teacher</a>
    </div>

    <div class="dashboard-card">
        <h1>Teacher Dashboard</h1>
        <p>Welcome, Teacher Felipe.</p>
        <hr>
        <p>Student session logs and settings will appear here.</p>
        <br>
        <button class="btn-exit" onclick="window.location.href='index.html'">Exit Dashboard</button>
    </div>

</body>
</html>
