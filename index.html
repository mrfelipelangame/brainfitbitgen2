<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainFitBit - Soroban Trainer</title>
<style>
    :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --success: #10b981;
        --danger: #ef4444;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text: #1e293b;
        --border: #e2e8f0;
    }

    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
    }

    #welcome-screen, #menu-container, #table-container { 
        text-align: center; 
        background: var(--card-bg); 
        padding: 40px; 
        border-radius: 16px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        margin-top: 60px;
        width: 100%;
        max-width: 500px;
        box-sizing: border-box;
    }

    #home-btn { position: fixed; top: 20px; left: 20px; background: var(--success); z-index: 1001; }
    #teacher-btn { position: fixed; top: 20px; right: 20px; background: var(--danger); z-index: 1000; }

    input, select { padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid var(--border); font-size: 1rem; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; background: var(--primary); color: white; border: none; font-weight: bold; padding: 12px 25px; border-radius: 8px; transition: all 0.2s; }
    button:hover { transform: translateY(-2px); opacity: 0.9; }

    /* Estética das Equações Individuais */
    .equation-card { display: none; animation: fadeIn 0.3s ease; }
    .equation-card.active { display: block; }
    
    table { border-collapse: collapse; margin: 20px auto; background: #fff; width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid var(--border); }
    td { border: 1px solid var(--border); text-align: center; font-size: 32px; font-weight: 800; padding: 15px; }
    
    .answer-input { font-size: 28px; text-align: center; border: 2px solid var(--primary); border-radius: 8px; margin-top: 10px; }
    
    /* Feedback de Erro/Acerto */
    .result-item { margin-bottom: 15px; padding: 15px; border-radius: 10px; border: 1px solid var(--border); text-align: left; }
    .res-correct { border-left: 5px solid var(--success); background: #f0fdf4; }
    .res-wrong { border-left: 5px solid var(--danger); background: #fef2f2; }
    .correct-val { color: var(--success); font-weight: bold; font-size: 1.2rem; }
    .wrong-val { color: var(--danger); text-decoration: line-through; font-size: 1rem; }
    .correction-label { display: block; font-size: 0.8rem; color: #64748b; margin-top: 5px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<button id="home-btn" onclick="location.reload()">🏠 Home</button>
<button id="teacher-btn" onclick="openTeacherLogin()">🔑 Teacher</button>

<div id="welcome-screen">
    <img src="BrainFitBitCapy.png" style="max-width: 150px; margin-bottom: 20px;">
    <h1>BrainFitBit</h1>
    <input type="text" id="student-name" placeholder="Enter your name">
    <br><br>
    <button onclick="showMenu()" style="width:100%">Next</button>
</div>

<div id="menu-container" style="display:none">
    <h2 id="greeting-text"></h2>
    <div style="text-align:left">
        <label>Method</label>
        <select id="method">
            <option value="Simple">Simple</option>
            <option value="Small Friend">Small Friend</option>
            <option value="Big Friend">Big Friend</option>
            <option value="Mixed">Mixed</option>
            <option value="All">All</option>
        </select>
        <label>Columns</label><input type="number" id="columns" value="1">
        <label>Rows</label><input type="number" id="rows" value="5">
        <label>Questions</label><input type="number" id="questions" value="5">
    </div>
    <br>
    <button onclick="generate()" style="width:100%; background:var(--success)">Start Session</button>
</div>

<div id="table-container" style="display:none">
    <div id="quiz-area"></div>
    <div id="final-results" style="display:none"></div>
    <div id="restart-container" style="margin-top:20px"></div>
</div>

<div id="teacher-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:12px; text-align:center; position:relative;">
        <button onclick="closeModal()" style="position:absolute; top:10px; right:10px; background:none; color:#000;">X</button>
        <h2>Teacher Access</h2>
        <input type="text" id="teacher-id" placeholder="ID"><br>
        <input type="password" id="teacher-pass" placeholder="Password"><br>
        <button onclick="loginTeacher()" style="background:var(--danger); width:100%">Login</button>
    </div>
</div>

<script>
let data = [], studentName = "";

function showMenu() {
    let name = document.getElementById("student-name").value.trim();
    if (!name) return alert("Enter name");
    studentName = name;
    document.getElementById("welcome-screen").style.display = "none";
    document.getElementById("menu-container").style.display = "block";
    document.getElementById("greeting-text").innerText = "Hello, " + studentName;
}

// --- MOTOR DE CÁLCULO ORIGINAL ---
function generateFullNumber(maxColumns) {
    let num = 0;
    for (let i = 0; i < maxColumns; i++) {
        let digit = Math.floor(Math.random() * 10);
        if (i === maxColumns - 1 && maxColumns > 1 && digit === 0) digit = 1;
        num += digit * Math.pow(10, i);
    }
    return num;
}

function validMove(total, num, method, op) {
    let newTotal = op === 1 ? total + num : total - num;
    if (newTotal < 0) return false;
    if (method === "All") return true;
    for (let i = 0; i < 13; i++) {
        let p = Math.pow(10, i);
        let dTotal = Math.floor((total / p) % 10);
        let dNum = Math.floor((num / p) % 10);
        if (dNum === 0) continue; 
        let hasFive = dTotal >= 5;
        let lowerBeads = dTotal % 5;
        if (op === 1) {
            let isSimple = (dNum <= (4 - lowerBeads)) || (dNum >= 5 && !hasFive && (dNum - 5 <= 4 - lowerBeads));
            let isSmall = (dNum < 5) && (dNum > (4 - lowerBeads)) && !hasFive;
            let isBig = (dTotal + dNum >= 10);
            let isMixed = isBig && ((dTotal + dNum) % 10 < 5) && !hasFive;
            if (method === "Simple") { if (!isSimple || isBig) return false; }
            else if (method === "Small Friend") { if (isBig || (!isSmall && !isSimple)) return false; }
            else if (method === "Big Friend") { if (!isSimple && !isBig) return false; }
        } else {
            let isSimpleSub = (dNum <= lowerBeads) || (dNum >= 5 && hasFive && (dNum - 5 <= lowerBeads));
            let isSmallSub = (dNum < 5) && (dNum > lowerBeads) && hasFive;
            let isBigSub = (dTotal < dNum);
            if (method === "Simple") { if (!isSimpleSub || isBigSub) return false; }
            else if (method === "Small Friend") { if (isBigSub || (!isSmallSub && !isSimpleSub)) return false; }
        }
    }
    return true;
}

function generate() {
    const method = document.getElementById("method").value;
    const cols = parseInt(document.getElementById("columns").value);
    const rows = parseInt(document.getElementById("rows").value);
    const q = parseInt(document.getElementById("questions").value);
    data = [];
    for (let i = 0; i < q; i++) {
        let moves = [], currentTotal = 0;
        for (let r = 0; r < rows; r++) {
            let num, sign, valid = false, tries = 0;
            while (!valid && tries < 1500) {
                num = generateFullNumber(cols); 
                sign = (r === 0) ? 1 : (Math.random() < 0.5 ? 1 : -1);
                valid = validMove(currentTotal, num, method, sign);
                tries++;
            }
            if (!valid) { num = 1; sign = (currentTotal > 0) ? -1 : 1; }
            moves.push(sign * num);
            currentTotal += (sign * num);
        }
        data.push({ moves: moves, total: currentTotal, studentAnswer: null });
    }
    renderQuiz();
    document.getElementById("menu-container").style.display = "none";
    document.getElementById("table-container").style.display = "block";
}

function renderQuiz() {
    const container = document.getElementById("quiz-area");
    container.innerHTML = "";
    data.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = `equation-card ${index === 0 ? 'active' : ''}`;
        card.id = `q-${index}`;
        
        let tableHtml = `<h3>Question ${index + 1} of ${data.length}</h3><table>`;
        item.moves.forEach((m, r) => {
            let display = r === 0 ? Math.abs(m) : (m < 0 ? "-" + Math.abs(m) : "+" + m);
            tableHtml += `<tr><td>${display}</td></tr>`;
        });
        tableHtml += `</table><input type="number" id="ans-${index}" class="answer-input" placeholder="Result">`;
        
        const btn = document.createElement("button");
        btn.style.width = "100%";
        btn.style.marginTop = "20px";
        if (index < data.length - 1) {
            btn.innerText = "Next Question";
            btn.onclick = () => {
                data[index].studentAnswer = document.getElementById(`ans-${index}`).value;
                if(!data[index].studentAnswer) return alert("Please answer first");
                document.getElementById(`q-${index}`).classList.remove('active');
                document.getElementById(`q-${index+1}`).classList.add('active');
            };
        } else {
            btn.innerText = "Check Answers";
            btn.style.background = "var(--success)";
            btn.onclick = () => {
                data[index].studentAnswer = document.getElementById(`ans-${index}`).value;
                if(!data[index].studentAnswer) return alert("Please answer first");
                showResults();
            };
        }
        
        card.innerHTML = tableHtml;
        card.appendChild(btn);
        container.appendChild(card);
    });
}

function showResults() {
    document.getElementById("quiz-area").style.display = "none";
    const resDiv = document.getElementById("final-results");
    resDiv.style.display = "block";
    let correctCount = 0;
    let html = `<h2>Performance Summary</h2>`;

    data.forEach((item, i) => {
        const isCorrect = Number(item.studentAnswer) === item.total;
        if(isCorrect) correctCount++;
        
        html += `<div class="result-item ${isCorrect ? 'res-correct' : 'res-wrong'}">
            <strong>Question #${i+1}</strong><br>`;
        
        if(isCorrect) {
            html += `<span class="correct-val">✔ ${item.studentAnswer}</span>`;
        } else {
            html += `<span class="wrong-val">✘ ${item.studentAnswer || 'Empty'}</span>
                     <span class="correction-label">Correct answer:</span>
                     <span class="correct-val">${item.total}</span>`;
        }
        html += `</div>`;
    });

    resDiv.innerHTML = html + `<h3>Final Score: ${correctCount} / ${data.length}</h3>`;
    document.getElementById("restart-container").innerHTML = `<button onclick="restart()" style="width:100%">New Training</button>`;
}

function restart() {
    document.getElementById("table-container").style.display = "none";
    document.getElementById("quiz-area").style.display = "block";
    document.getElementById("final-results").style.display = "none";
    document.getElementById("menu-container").style.display = "block";
}

function openTeacherLogin() { document.getElementById("teacher-modal").style.display = "flex"; }
function closeModal() { document.getElementById("teacher-modal").style.display = "none"; }
function loginTeacher() {
    if(document.getElementById("teacher-id").value === "FelipeMoreno" && document.getElementById("teacher-pass").value === "2906Noah") {
        window.location.href = "teacher.html";
    } else alert("Invalid login");
}
</script>
</body>
</html>
