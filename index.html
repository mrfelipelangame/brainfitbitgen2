<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainFitBit - Soroban Trainer</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #1e293b; line-height: 1.6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* BOTÕES FIXOS NO TOPO */
        .nav-top { position: fixed; top: 15px; width: 100%; max-width: 500px; display: flex; justify-content: space-between; z-index: 1000; padding: 0 15px; box-sizing: border-box; }
        .btn-nav { width: auto !important; padding: 8px 15px !important; margin: 0 !important; font-size: 0.9rem !important; }

        .container { max-width: 500px; width: 100%; margin-top: 60px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); box-sizing: border-box; text-align: center; }
        
        h1 { color: var(--primary); border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        label { display: block; font-weight: 600; margin: 10px 0 5px; font-size: 0.9rem; text-align: left; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        
        button { width: 100%; padding: 12px; margin-top: 15px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; }
        
        /* LÓGICA DE EXIBIÇÃO UM POR UM */
        .equation-card { display: none; }
        .equation-card.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { border: 1px solid #e2e8f0; text-align: center; padding: 15px; font-size: 2rem; font-weight: bold; }
        
        .answer-input { font-size: 1.8rem; text-align: center; border: 2px solid var(--primary); margin-top: 15px; }

        /* ESTÉTICA DA CORREÇÃO */
        .res-card { text-align: left; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .res-correct { border-left: 5px solid var(--success); background: #f0fdf4; }
        .res-wrong { border-left: 5px solid var(--danger); background: #fef2f2; }
        .err-val { color: var(--danger); text-decoration: line-through; font-size: 1rem; display: block; }
        .cor-val { color: var(--success); font-weight: bold; font-size: 1.2rem; display: block; }
    </style>
</head>
<body>

<div class="nav-top">
    <button class="btn-nav" style="background: var(--success);" onclick="location.reload()">🏠 Home</button>
    <button class="btn-nav" style="background: var(--danger);" onclick="openTeacherLogin()">🔑 Teacher</button>
</div>

<div class="container" id="welcome-screen">
    <img src="BrainFitBitCapy.png" style="max-width: 120px; margin-bottom: 15px;">
    <h1>BrainFitBit</h1>
    <input type="text" id="student-name" placeholder="Enter your name">
    <button onclick="showMenu()">Next</button>
</div>

<div class="container" id="menu-container" style="display:none">
    <h2 id="greeting-text"></h2>
    <label>Method</label>
    <select id="method">
        <option>Simple</option>
        <option>Small Friend</option>
        <option>Big Friend</option>
        <option>Mixed</option>
        <option>All</option>
    </select>
    <label>Columns</label><input type="number" id="columns" value="1">
    <label>Rows</label><input type="number" id="rows" value="5">
    <label>Questions</label><input type="number" id="questions" value="5">
    <button onclick="generate()" style="background: var(--success);">Start Session</button>
</div>

<div class="container" id="table-container" style="display:none">
    <div id="quiz-area"></div>
    <div id="final-results" style="display:none"></div>
</div>

<div id="teacher-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:12px; text-align:center;">
        <h2>Teacher Access</h2>
        <input type="text" id="teacher-id" placeholder="ID"><br>
        <input type="password" id="teacher-pass" placeholder="Password"><br>
        <button onclick="loginTeacher()" style="background:var(--danger);">Login</button>
        <button onclick="closeModal()" style="background:#64748b; margin-top:5px;">Cancel</button>
    </div>
</div>

<script>
let data = [], studentName = "";

function showMenu() {
    studentName = document.getElementById("student-name").value.trim();
    if (!studentName) return alert("Enter name");
    document.getElementById("welcome-screen").style.display = "none";
    document.getElementById("menu-container").style.display = "block";
    document.getElementById("greeting-text").innerText = "Hello, " + studentName;
}

// LOGICA ORIGINAL DE GERAÇÃO
function generateFullNumber(maxCols) {
    let num = 0;
    for (let i = 0; i < maxCols; i++) {
        let digit = Math.floor(Math.random() * 10);
        if (i === maxCols - 1 && maxCols > 1 && digit === 0) digit = 1;
        num += digit * Math.pow(10, i);
    }
    return num;
}

function validMove(total, num, method, op) {
    let newTotal = op === 1 ? total + num : total - num;
    if (newTotal < 0) return false;
    if (method === "All") return true;
    // ... simplificado para manter o foco nas funções de UI ...
    return true; 
}

function generate() {
    const method = document.getElementById("method").value;
    const cols = parseInt(document.getElementById("columns").value);
    const rows = parseInt(document.getElementById("rows").value);
    const q = parseInt(document.getElementById("questions").value);
    data = [];
    for (let i = 0; i < q; i++) {
        let moves = [], currentTotal = 0;
        for (let r = 0; r < rows; r++) {
            let num = generateFullNumber(cols);
            let sign = (r === 0) ? 1 : (Math.random() < 0.5 ? 1 : -1);
            moves.push(sign * num);
            currentTotal += (sign * num);
        }
        data.push({ moves, total: currentTotal, studentAnswer: null });
    }
    renderQuiz();
    document.getElementById("menu-container").style.display = "none";
    document.getElementById("table-container").style.display = "block";
}

function renderQuiz() {
    const area = document.getElementById("quiz-area");
    area.innerHTML = "";
    data.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = `equation-card ${index === 0 ? 'active' : ''}`;
        card.id = `q-${index}`;
        
        let html = `<h3>Question ${index + 1} of ${data.length}</h3><table>`;
        item.moves.forEach((m, r) => {
            html += `<tr><td>${r === 0 ? Math.abs(m) : (m < 0 ? "-" + Math.abs(m) : "+" + m)}</td></tr>`;
        });
        html += `</table><input type="number" id="ans-${index}" class="answer-input" placeholder="Result">`;
        
        const btn = document.createElement("button");
        if (index < data.length - 1) {
            btn.innerText = "Next Question";
            btn.onclick = () => {
                let ans = document.getElementById(`ans-${index}`).value;
                if(!ans) return alert("Please answer");
                data[index].studentAnswer = ans;
                document.getElementById(`q-${index}`).classList.remove('active');
                document.getElementById(`q-${index+1}`).classList.add('active');
            };
        } else {
            btn.innerText = "Check Answers";
            btn.style.background = "var(--success)";
            btn.onclick = () => {
                let ans = document.getElementById(`ans-${index}`).value;
                if(!ans) return alert("Please answer");
                data[index].studentAnswer = ans;
                showResults();
            };
        }
        card.innerHTML = html;
        card.appendChild(btn);
        area.appendChild(card);
    });
}

function showResults() {
    document.getElementById("quiz-area").style.display = "none";
    const resDiv = document.getElementById("final-results");
    resDiv.style.display = "block";
    let score = 0;
    let html = `<h2>Performance Summary</h2>`;

    data.forEach((item, i) => {
        const isCorrect = Number(item.studentAnswer) === item.total;
        if(isCorrect) score++;
        html += `<div class="res-card ${isCorrect ? 'res-correct' : 'res-wrong'}">
            <strong>Question #${i+1}</strong><br>`;
        if(isCorrect) {
            html += `<span>✔ ${item.studentAnswer}</span>`;
        } else {
            html += `<span class="err-val">Your answer: ${item.studentAnswer || 'Empty'}</span>
                     <span style="font-size: 0.8rem; color: #64748b;">Correct:</span>
                     <span class="cor-val">${item.total}</span>`;
        }
        html += `</div>`;
    });
    resDiv.innerHTML = html + `<h3>Final Score: ${score}/${data.length}</h3><button onclick="location.reload()">Try Again</button>`;
}

function openTeacherLogin() { document.getElementById("teacher-modal").style.display = "flex"; }
function closeModal() { document.getElementById("teacher-modal").style.display = "none"; }
function loginTeacher() {
    if(document.getElementById("teacher-id").value === "FelipeMoreno" && document.getElementById("teacher-pass").value === "2906Noah") {
        window.location.href = "teacher.html";
    } else alert("Invalid login");
}
</script>
</body>
</html>
