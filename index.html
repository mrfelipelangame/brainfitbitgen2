<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainFitBit - Soroban Trainer</title>
<style>
    /* ESTÉTICA ORIGINAL */
    body { font-family:"Comic Sans MS",cursive,sans-serif; max-width:950px; margin:auto; padding:20px; background:#a0daf3; color:#2c3e50; }
    #welcome-screen,#menu-container,#table-container { text-align:center; background:rgba(255,255,255,0.95); padding:30px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); margin-top:20px; }
    h1 { color:#1a73e8; margin-bottom:10px; }
    
    /* REMOVER SETAS DOS INPUTS */
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    input, select, button { padding:10px; margin:5px; border-radius:8px; border:1px solid #ccc; font-size:1rem; }
    button { cursor:pointer; background:#2196F3; color:white; border:none; font-weight:bold; transition:transform .2s; }
    button:hover { transform:scale(1.05); background:#1976D2; }

    /* LAYOUT DA TABELA (CONFORME IMAGEM) */
    .equation-card { display: none; }
    .equation-card.active { display: block; }
    table { border-collapse: collapse; margin: 20px auto; background: white; width: 250px; }
    td { border: 1px solid #333; text-align: center; font-size: 45px; font-weight: bold; padding: 15px; color: #2c3e50; }
    
    .answer-input-large { width: 100%; max-width: 230px; text-align: center; font-size: 35px; font-weight: bold; border-radius: 12px; border: 4px solid #6395ed; margin: 15px 0; color: #6395ed; outline: none; }
    
    /* RESULTADOS E PDF */
    .result-card { background: white; padding: 15px; margin: 10px auto; border-radius: 10px; border: 2px solid #ccc; max-width: 550px; text-align: left; }
    .res-correct { border-left: 8px solid #4CAF50; background: #f0fff0; }
    .res-wrong { border-left: 8px solid #f44336; background: #fff5f5; }
    .wrong-val { color: #f44336; text-decoration: line-through; margin-right: 10px; }
    .correct-val { color: #4CAF50; font-weight: bold; }

    #home-btn { position:fixed; top:20px; left:20px; background:#4CAF50; z-index:1000; }
    #teacher-btn { position:fixed; top:20px; right:20px; background:#f44336; z-index:1000; }
</style>
</head>
<body>

<button id="home-btn" onclick="location.reload()">🏠 Home</button>
<button id="teacher-btn" onclick="openTeacherLogin()">🔑 Teacher</button>

<div id="welcome-screen">
    <img src="BrainFitBitCapy.png" style="max-width:180px;" alt="Logo">
    <h1>Welcome to BrainFitBit!</h1>
    <input type="text" id="student-name" placeholder="Student name">
    <br><br>
    <button onclick="showMenu()" style="background:#4CAF50;padding:12px 40px">Next</button>
</div>

<div id="menu-container" style="display:none">
    <h2 id="greeting-text"></h2>
    <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px;">
        <label><b>Method</b><br>
        <select id="method">
            <option value="Simple">Simple</option>
            <option value="Small Friend">Small Friend</option>
            <option value="Big Friend">Big Friend</option>
            <option value="Mixed">Mixed</option>
            <option value="All">All</option>
        </select></label>
        <label><b>Columns</b><br><input type="number" id="columns" value="1" style="width:60px"></label>
        <label><b>Rows</b><br><input type="number" id="rows" value="5" style="width:60px"></label>
        <label><b>Questions</b><br><input type="number" id="questions" value="5" style="width:60px"></label>
    </div>
    <br>
    <button onclick="generate()" style="padding:15px 50px; font-size:1.3rem; background:#4CAF50;">Let's do it!</button>
</div>

<div id="table-container" style="display:none">
    <div id="quiz-area"></div>
    <div id="results-screen" style="display:none">
        <h2 id="final-score"></h2>
        <div id="detailed-results"></div>
        <div style="margin-top:20px;">
            <button onclick="savePDF()" style="background:#ff9800; padding:12px 30px;">Save Results (PDF)</button>
            <button onclick="restartToMenu()" style="background:#4CAF50; padding:12px 30px;">Restart</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let data = [], studentName = "";

function showMenu() {
    studentName = document.getElementById("student-name").value.trim();
    if (!studentName) return alert("Please enter your name");
    document.getElementById("welcome-screen").style.display = "none";
    document.getElementById("menu-container").style.display = "block";
    document.getElementById("greeting-text").innerText = "Hello, " + studentName + "!";
}

// MOTOR DE GERAÇÃO ORIGINAL (SOROBAN RULES)
function validMove(total, num, method, op) {
    let newTotal = op === 1 ? total + num : total - num;
    if (newTotal < 0) return false;
    if (method === "All") return true;

    for (let i = 0; i < 13; i++) {
        let p = Math.pow(10, i);
        let dTotal = Math.floor((total / p) % 10);
        let dNum = Math.floor((num / p) % 10);
        if (dNum === 0) continue; 
        
        let hasFive = dTotal >= 5, lower = dTotal % 5;

        if (op === 1) { // Addition
            let isSimple = (dNum <= (4-lower)) || (dNum >= 5 && !hasFive && (dNum-5 <= 4-lower));
            let isSmall = (dNum < 5) && (dNum > (4-lower)) && !hasFive;
            let isBig = (dTotal + dNum >= 10);
            if (method === "Simple") { if (!isSimple || isBig) return false; }
            else if (method === "Small Friend") { if (isBig || (!isSmall && !isSimple)) return false; }
            else if (method === "Big Friend") { if (!isSimple && !isBig) return false; }
        } else { // Subtraction
            let isSimpleSub = (dNum <= lower) || (dNum >= 5 && hasFive && (dNum-5 <= lower));
            let isSmallSub = (dNum < 5) && (dNum > lower) && hasFive;
            let isBigSub = (dTotal < dNum);
            if (method === "Simple") { if (!isSimpleSub || isBigSub) return false; }
            else if (method === "Small Friend") { if (isBigSub || (!isSmallSub && !isSimpleSub)) return false; }
        }
    }
    return true;
}

function generate() {
    const method = document.getElementById("method").value;
    const cols = parseInt(document.getElementById("columns").value);
    const rows = parseInt(document.getElementById("rows").value);
    const q = parseInt(document.getElementById("questions").value);
    data = [];
    
    for (let i = 0; i < q; i++) {
        let moves = [], currentTotal = 0;
        for (let r = 0; r < rows; r++) {
            let num, sign, valid = false, tries = 0;
            while(!valid && tries < 1500) {
                num = 0;
                for(let c=0; c<cols; c++) {
                    let d = Math.floor(Math.random()*10);
                    if(c === cols-1 && cols > 1 && d === 0) d = 1;
                    num += d * Math.pow(10, c);
                }
                if (num === 0) num = 1;
                sign = (r === 0) ? 1 : (Math.random() < 0.5 ? 1 : -1);
                valid = validMove(currentTotal, num, method, sign);
                tries++;
            }
            moves.push(sign * num);
            currentTotal += (sign * num);
        }
        data.push({ moves, total: currentTotal, studentAnswer: "" });
    }
    renderQuiz();
}

function renderQuiz() {
    document.getElementById("menu-container").style.display = "none";
    document.getElementById("results-screen").style.display = "none";
    document.getElementById("table-container").style.display = "block";
    const area = document.getElementById("quiz-area");
    area.style.display = "block";
    area.innerHTML = "";

    data.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = `equation-card ${index === 0 ? 'active' : ''}`;
        card.id = `q-${index}`;
        
        let html = `<h2 style="color:#1a73e8">Question ${index + 1} of ${data.length}</h2><table>`;
        item.moves.forEach((m, r) => {
            html += `<tr><td>${r === 0 ? Math.abs(m) : (m < 0 ? "-" + Math.abs(m) : "+" + m)}</td></tr>`;
        });
        html += `</table><input type="number" id="ans-${index}" class="answer-input-large" placeholder="?">`;
        
        const btn = document.createElement("button");
        btn.style.width = "250px"; btn.style.padding = "15px"; btn.style.fontSize = "1.2rem";
        
        if (index < data.length - 1) {
            btn.innerText = "Next Question ➡️";
            btn.onclick = () => {
                let inputVal = document.getElementById(`ans-${index}`).value;
                if(inputVal === "") return alert("Please enter an answer");
                data[index].studentAnswer = inputVal;
                document.getElementById(`q-${index}`).classList.remove('active');
                document.getElementById(`q-${index+1}`).classList.add('active');
            };
        } else {
            btn.innerText = "Check Answers ✅";
            btn.style.background = "#4CAF50";
            btn.onclick = () => {
                let inputVal = document.getElementById(`ans-${index}`).value;
                if(inputVal === "") return alert("Please enter an answer");
                data[index].studentAnswer = inputVal;
                showFinalResults();
            };
        }
        card.innerHTML = html;
        card.appendChild(btn);
        area.appendChild(card);
    });
}

function showFinalResults() {
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("results-screen").style.display = "block";
    let score = 0;
    let html = "";
    data.forEach((item, i) => {
        const isCorrect = Number(item.studentAnswer) === item.total;
        if(isCorrect) score++;
        html += `<div class="result-card ${isCorrect ? 'res-correct' : 'res-wrong'}">
            <b>Question ${i+1}:</b><br>
            ${isCorrect ? 
                `<span>✔ Correct! Answer: <b>${item.total}</b></span>` : 
                `<span>✘ Wrong. Your answer: <span class="wrong-val">${item.studentAnswer || 'Empty'}</span> Correct: <span class="correct-val">${item.total}</span></span>`
            }
        </div>`;
    });
    document.getElementById("final-score").innerText = `Results for ${studentName}: ${score} / ${data.length}`;
    document.getElementById("detailed-results").innerHTML = html;
}

function restartToMenu() {
    document.getElementById("table-container").style.display = "none";
    document.getElementById("results-screen").style.display = "none";
    document.getElementById("menu-container").style.display = "block";
}

function savePDF() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();
    doc.setFontSize(16);
    doc.text(`BrainFitBit Report - ${studentName}`, 15, 15);
    doc.setFontSize(12);
    data.forEach((item, i) => {
        let status = Number(item.studentAnswer) === item.total ? "OK" : "WRONG";
        doc.text(`Q${i+1}: [${item.moves.join(", ")}] = ${item.total} (Student: ${item.studentAnswer}) - ${status}`, 15, 25 + (i*10));
    });
    doc.save(`Soroban_Results_${studentName}.pdf`);
}

function openTeacherLogin() {
    let id = prompt("Teacher ID:");
    let pass = prompt("Password:");
    if(id === "FelipeMoreno" && pass === "2906Noah") alert("Login Success!");
    else alert("Invalid Credentials");
}
</script>
</body>
</html>
