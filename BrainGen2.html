<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BrainFitBit</title>
<style>
body { font-family: "Comic Sans MS", cursive, sans-serif; max-width: 900px; margin: auto; padding: 20px; background-color: #a0daf3; }
input, select, button { padding: 8px; margin: 5px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
td, th { border: 1px solid #ccc; padding: 10px; text-align: center; }
.correct { background: #9df29d; }
.wrong { background: #ea9e9e; }
button { cursor: pointer; font-weight: bold; }
table input {
    text-align: center;       /* centraliza o número digitado */
    width: 60px;              /* largura fixa para uniformidade */
    padding: 5px;             /* deixa o input confortável */
    font-weight: bold;        /* opcional: deixa o número em negrito */
    font-size: 1rem;          /* tamanho legível */
    table td {
    vertical-align: middle;   /* centraliza verticalmente */
}
}
</style>
</head>
<body>

<div style="text-align: center;">
  <img src="/Users/user/Downloads/BrainFitBitCapy.png" alt="BrainFitBit Image" style="max-width: 30%; height: auto;">
</div>

<div id="menu-container" style="text-align:center;">
  <b>
  Method:
  <select id="method">
    <option>Simple</option>
    <option>Small Friend</option>
    <option>Big Friend</option>
    <option>Mixed</option>
    <option>All</option>
  </select>

  Operations:
  <select id="operation">
    <option>+</option>
    <option>-</option>
    <option>+-</option>
  </select>

  Columns:
  <input type="number" id="columns" value="3" min="1" max="6">

  Rows:
  <input type="number" id="rows" value="5" min="1" max="6">

  Questions:
  <input type="number" id="questions" value="5" min="1" max="10">

  <br>
  <button id="generate-btn" onclick="generate()" style="margin-top:10px;">Let's do it!</button>
  </b>
</div>

<div id="restart-container"></div>
<div id="table"></div>

<script>
let data=[];

// ---------- FUNÇÃO DE VALIDAÇÃO DOS MÉTODOS ----------
function methodValid(total, number, sign, method) {
    if (sign !== 1 && sign !== -1) sign = 1;
    let newTotal = total + number * sign;
    if (newTotal < 0) return false;

    let totalDigits = String(total).padStart(6,'0').split('').map(Number).reverse();
    let numberDigits = String(number).padStart(6,'0').split('').map(Number).reverse();

    let isSimple = true;
    let isSmall = true;
    let isBig = false;

    for (let i=0;i<totalDigits.length;i++){
        let t = totalDigits[i];
        let n = numberDigits[i] * sign;
        let result = t + n;

        if(result < 0) return false;

        // Big Friend: ultrapassa 9 na coluna
        if(result > 9){
            isBig = true;
            isSimple = false;
            isSmall = false;
        }
        // Small Friend: usa pedra 5 para compensar sem ultrapassar 9
        else if ((t + n > 4 && t + n <= 9 && n !==5 && t !==5) || (t>4 && n<0 && result>=0)){
            isSimple = false;
        }
    }

    switch(method){
        case "Simple": return isSimple;
        case "Small Friend": return isSmall;
        case "Big Friend": return isBig;
        case "Mixed": return isSmall || isBig;
        case "All": return true;
        default: return true;
    }
}

// ---------- FUNÇÃO DE GERAÇÃO DE NÚMEROS ----------
function generateNumber(columns){
    let number = 0;
    for(let i=0;i<columns;i++){
        let digit = Math.floor(Math.random()*10);
        number += digit * Math.pow(10,i);
    }
    return number;
}

// ---------- FUNÇÃO DE GERAÇÃO DE EQUAÇÕES ----------
function generate(){
    let method = document.getElementById("method").value;
    let operationType = document.getElementById("operation").value;
    let columns = parseInt(document.getElementById("columns").value);
    let rows = parseInt(document.getElementById("rows").value);
    let questions = parseInt(document.getElementById("questions").value);

    data=[];

    for(let i=0;i<questions;i++){
        let moves=[];
        let total=0;
        for(let r=0;r<rows;r++){
            let num = generateNumber(columns);
            let sign = 1;
            if(r>0){
                if(operationType=="-") sign=-1;
                else if(operationType=="+-") sign = Math.random()<0.5 ? 1:-1;
            }

            // Tenta gerar um número válido segundo o método
            let tries = 0;
            while(!methodValid(total,num,sign,method) && tries<50){
                num = generateNumber(columns);
                if(r>0){
                    if(operationType=="-") sign=-1;
                    else if(operationType=="+-") sign = Math.random()<0.5 ? 1:-1;
                } else { sign=1; }
                tries++;
            }

            if(total + num*sign < 0) sign=1; // nunca negativo
            total += num*sign;
            moves.push(num*sign);
        }
        data.push({moves: moves, total: total});
    }

    render(rows,questions);
    document.getElementById("menu-container").style.display = "none";
}

// ---------- FUNÇÃO DE RENDERIZAÇÃO ----------
function render(rows,q){
    let html="<table>";
    for(let r=0;r<rows;r++){
        html+="<tr>";
        for(let i=0;i<q;i++){
            let value = data[i].moves[r];
            html+="<td>"+(value<0?"-":"")+Math.abs(value)+"</td>";
        }
        html+="</tr>";
    }

    html+="<tr>";
    for(let i=0;i<q;i++) html+="<td><input id='a"+i+"'></td>";
    html+="</tr>";
    html+="</table>";

    html+="<div style='text-align:center;'><br><button onclick='check()'>Check Answers</button></div>";
    html+="<span id='result'></span>";

    document.getElementById("table").innerHTML = html;
}

// ---------- FUNÇÃO DE CHECAGEM ----------
function check(){
    let correct=0;
    for(let i=0;i<data.length;i++){
        let input=document.getElementById("a"+i);
        let value=parseInt(input.value)||0;
        input.classList.remove("correct","wrong");
        if(value==data[i].total){
            input.classList.add("correct");
            correct++;
        } else input.classList.add("wrong");
    }
    document.getElementById("result").innerText = "Correct: "+correct+" / "+data.length;
    document.getElementById("restart-container").innerHTML = '<div style="text-align:center;"><button onclick="restart()">Go Again!</button></div>';
}

// ---------- FUNÇÃO DE RESTART ----------
function restart(){
    document.getElementById("table").innerHTML = "";
    document.getElementById("restart-container").innerHTML = "";
    document.getElementById("menu-container").style.display = "block";
    data=[];
}
</script>

</body>
</html>
