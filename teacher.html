<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - BrainFitBit</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; }
        
        /* Botão Home */
        .nav-header {
            max-width: 900px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: flex-start;
        }
        .btn-home {
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-home:hover { opacity: 0.9; }

        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 15px; margin-top: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; }
        
        h2 { font-size: 1.1rem; margin-top: 0; display: flex; align-items: center; gap: 10px; color: #475569; }
        
        label { display: block; font-weight: 600; margin: 10px 0 5px; font-size: 0.85rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .config-row { display: flex; gap: 10px; margin-top: 10px; }
        .config-row div { flex: 1; }
        
        .timer-box { 
            background: #f1f5f9; padding: 15px; border-radius: 10px; 
            margin-top: 20px; display: flex; align-items: center; gap: 12px; 
        }
        .timer-box input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        .timer-box label { margin: 0; font-size: 1.1rem; cursor: pointer; color: var(--primary); font-weight: 700; }

        button { 
            width: 100%; padding: 14px; margin-top: 15px; cursor: pointer; 
            background: var(--accent); color: white; border: none; 
            border-radius: 8px; font-weight: bold; font-size: 1rem; transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        #generated-link { 
            background: #f8fafc; padding: 15px; border-radius: 8px; 
            font-family: monospace; font-size: 11px; word-break: break-all; 
            margin-top: 15px; display: none; border: 1px dashed #cbd5e1; color: var(--accent);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { border: 1px solid #e2e8f0; text-align: center; padding: 10px; font-weight: bold; }
        .correct { background: #dcfce7; color: #166534; border: 2px solid var(--success); }
        .wrong { background: #fee2e2; color: #991b1b; border: 2px solid var(--danger); }
        .time-badge { background: var(--danger); color: white; padding: 3px 10px; border-radius: 15px; font-size: 0.9rem; margin-left: 10px; }
    </style>
</head>
<body>

<div class="nav-header">
    <button class="btn-home" onclick="window.location.href='index.html'">🏠 Home</button>
</div>

<div class="container">
    <h1>BrainFitBit Admin</h1>

    <div class="grid">
        <section class="card">
            <h2>👤 Register Student</h2>
            <label>Name</label>
            <input type="text" id="student-name" placeholder="Ex: Martin">
            <label>Email</label>
            <input type="email" id="student-email" placeholder="martin@email.com">
            <button onclick="addStudent()">Add Student</button>
        </section>

        <section class="card">
            <h2>⚙️ Config</h2>
            <label>Select Student</label>
            <select id="select-student"></select>
            
            <div class="config-row">
                <div><label>Cols</label><input type="number" id="cols" value="2"></div>
                <div><label>Rows</label><input type="number" id="rows" value="5"></div>
                <div><label>Qty</label><input type="number" id="qty" value="5"></div>
            </div>

            <div class="timer-box">
                <input type="checkbox" id="timer-check" checked>
                <label for="timer-check">Enable Stopwatch</label>
            </div>
        </section>
    </div>

    <button onclick="createLink()" style="background: var(--primary);">🔗 Generate & Copy Homework Link</button>
    <div id="generated-link"></div>

    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

    <h2>📊 Review Submissions</h2>
    <div class="card">
        <label>Upload Result JSON:</label>
        <input type="file" id="file-input" accept=".json">
        <button onclick="analyzeJSON()" style="background: #64748b;">Analyze Answers</button>
    </div>
    <div id="results-display" style="margin-top: 20px;"></div>
</div>

<script>
    window.onload = loadStudents;

    function addStudent() {
        const name = document.getElementById('student-name').value;
        const email = document.getElementById('student-email').value;
        if(!name || !email) return alert("Fill all fields");

        let list = JSON.parse(localStorage.getItem('students') || "[]");
        list.push({name, email});
        localStorage.setItem('students', JSON.stringify(list));
        loadStudents();
        document.getElementById('student-name').value = '';
        document.getElementById('student-email').value = '';
        alert("Student added!");
    }

    function loadStudents() {
        const list = JSON.parse(localStorage.getItem('students') || "[]");
        const sel = document.getElementById('select-student');
        sel.innerHTML = list.map(s => `<option value="${s.email}">${s.name}</option>`).join('');
    }

    function createLink() {
        const sel = document.getElementById('select-student');
        if(!sel.value) return alert("Register/Select a student first!");

        const name = sel.options[sel.selectedIndex].text;
        const c = document.getElementById('cols').value;
        const r = document.getElementById('rows').value;
        const q = document.getElementById('qty').value;
        const t = document.getElementById('timer-check').checked;

        const baseUrl = window.location.href.split('teacher.html')[0];
        const finalUrl = `${baseUrl}student.html?student=${encodeURIComponent(name)}&cols=${c}&rows=${r}&q=${q}&timer=${t}`;

        const linkDiv = document.getElementById('generated-link');
        linkDiv.innerText = finalUrl;
        linkDiv.style.display = 'block';

        navigator.clipboard.writeText(finalUrl);
        alert("Link copied to clipboard!");
    }

    function analyzeJSON() {
        const file = document.getElementById('file-input').files[0];
        if(!file) return alert("Select a file");

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                displayResults(data);
            } catch(err) {
                alert("Error reading JSON file.");
            }
        };
        reader.readAsText(file);
    }

    function displayResults(data) {
        const display = document.getElementById('results-display');
        const totalTime = data[0].time || "N/A";
        
        display.innerHTML = `<h3>Results Overview <span class="time-badge">⏱ Time: ${totalTime}</span></h3>`;

        data.forEach((item, index) => {
            let tableHtml = "<table>";
            item.moves.forEach(mRow => {
                tableHtml += `<tr><td>${mRow[0]}</td></tr>`;
            });
            
            const studentAns = item.studentAnswers[0];
            const isCorrect = studentAns == item.total;
            
            tableHtml += `<tr><td class="${isCorrect ? 'correct' : 'wrong'}">Ans: ${studentAns || 'N/A'} (Exp: ${item.total})</td></tr>`;
            tableHtml += "</table>";

            display.innerHTML += `
                <div class="card" style="margin-bottom: 15px;">
                    <strong>Question #${index + 1}</strong>
                    ${tableHtml}
                </div>
            `;
        });
    }
</script>

</body>
</html>
