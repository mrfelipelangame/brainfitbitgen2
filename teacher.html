<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainFitBit - Teacher Panel</title>
<style>
body{font-family:"Comic Sans MS",cursive,sans-serif; max-width:950px;margin:auto;padding:20px;background:#a0daf3;color:#2c3e50;}
input,select,button{padding:6px;margin:5px;font-size:1rem;}
button{cursor:pointer;background:#2196F3;color:white;border:none;border-radius:6px;font-weight:bold;}
button:hover{background:#1976D2;}
table{border-collapse:collapse;margin:auto;background:white;border-radius:6px;}
td{border:1px solid #555;text-align:center;font-size:16px;padding:5px;}
.correct{background:#9df29d;border:2px solid green;}
.wrong{background:#ea9e9e;border:2px solid red;}
</style>
</head>
<body>
<h1>BrainFitBit - Teacher Panel</h1>

<h2>1️⃣ Register Student</h2>
<label>Name:</label><input type="text" id="new-student-name"><br>
<label>Email:</label><input type="email" id="new-student-email"><br>
<button onclick="registerStudent()">Register Student</button>
<p id="register-msg" style="color:green;"></p>

<hr>

<h2>2️⃣ Generate Homework </h2>
<label>Student:</label>
<select id="teacher-student-select"></select><br>
<label>Method:</label>
<select id="teacher-method">
<option>Simple</option>
<option>Small Friend</option>
<option>Big Friend</option>
<option>Mixed</option>
<option>All</option>
</select><br>
<label>Columns:</label><input type="number" id="teacher-cols" value="3"><br>
<label>Rows:</label><input type="number" id="teacher-rows" value="5"><br>
<label>Questions:</label><input type="number" id="teacher-questions" value="5"><br>
<button onclick="generateHomeworkLink()">Generate Link</button>
<button onclick="sendHomework()">Send Homework via Email</button>
<p id="generated-link"></p>
<p id="email-msg" style="color:green;"></p>

<hr>

<h2>3️⃣ Load Student Answers </h2>
<input type="file" id="json-file" accept=".json">
<button onclick="loadStudentAnswers()">Load Answers</button>
<div id="answers-container"></div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script type="text/javascript">
   (function(){
      emailjs.init('MukrMYpsZqIkdIG0s'); // sua Public Key
   })();
</script>

<script>
// ====== STUDENTS STORAGE ======
function saveStudent(name,email){
  let students = JSON.parse(localStorage.getItem("students")||"[]");
  if(name && email && !students.find(s=>s.email===email)){
    students.push({name,email});
    localStorage.setItem("students",JSON.stringify(students));
  }
}
function loadStudents(){
  let students = JSON.parse(localStorage.getItem("students")||"[]");
  let select = document.getElementById("teacher-student-select");
  select.innerHTML="<option value=''>Select Student</option>";
  students.forEach(s=>{
    let opt=document.createElement("option");
    opt.value=s.email;
    opt.text=s.name+" ("+s.email+")";
    select.appendChild(opt);
  });
}
loadStudents();

// ====== REGISTER STUDENT ======
function registerStudent(){
  let name=document.getElementById("new-student-name").value.trim();
  let email=document.getElementById("new-student-email").value.trim();
  if(!name || !email){ alert("Fill name and email!"); return; }
  saveStudent(name,email);
  loadStudents();
  document.getElementById("register-msg").innerText="Student registered successfully!";
  document.getElementById("new-student-name").value="";
  document.getElementById("new-student-email").value="";
}

// ====== GENERATE HOMEWORK LINK ======
function generateHomeworkLink(){
  let select=document.getElementById("teacher-student-select");
  if(!select.value){ alert("Select a student"); return; }
  let studentName=select.options[select.selectedIndex].text.split(" (")[0];
  let method=document.getElementById("teacher-method").value;
  let cols=Math.max(1,parseInt(document.getElementById("teacher-cols").value)||3);
  let rows=Math.max(1,parseInt(document.getElementById("teacher-rows").value)||5);
  let q=Math.max(1,parseInt(document.getElementById("teacher-questions").value)||5);

  let url=`student.html?student=${encodeURIComponent(studentName)}&method=${method}&cols=${cols}&rows=${rows}&q=${q}`;
  document.getElementById("generated-link").innerText=url;
  prompt("Copy the link for the student:",url);
}

// ====== SEND HOMEWORK EMAIL ======
function sendHomework(){
  let select=document.getElementById("teacher-student-select");
  if(!select.value){ alert("Select a student"); return; }
  
  let studentName = select.options[select.selectedIndex].text.split(" (")[0];
  let studentEmail = select.value;
  
  let method=document.getElementById("teacher-method").value;
  let cols=Math.max(1,parseInt(document.getElementById("teacher-cols").value)||3);
  let rows=Math.max(1,parseInt(document.getElementById("teacher-rows").value)||5);
  let q=Math.max(1,parseInt(document.getElementById("teacher-questions").value)||5);

  let homeworkLink = `${window.location.origin}/student.html?student=${encodeURIComponent(studentName)}&method=${method}&cols=${cols}&rows=${rows}&q=${q}`;
   
  emailjs.send('service_qs2cyzt','template_u09c9if',{
    student_name: studentName,
    homework_link: homeworkLink,
    to_email: studentEmail
  })
  .then(function(response){
    document.getElementById("email-msg").innerText="Homework sent successfully!";
  }, function(error){
    alert("Failed to send email. Check EmailJS configuration.");
  });
}

// ====== LOAD STUDENT ANSWERS ======
function loadStudentAnswers(){
  const fileInput=document.getElementById("json-file");
  if(fileInput.files.length===0){ alert("Choose a JSON file"); return; }
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      showAnswers(data);
    }catch(err){
      alert("Invalid JSON file!");
    }
  };
  reader.readAsText(fileInput.files[0]);
}

function showAnswers(data){
  const container=document.getElementById("answers-container");
  container.innerHTML="";
  data.forEach((item,i)=>{
    let div=document.createElement("div");
    let score=0;
    let html="<table>";
    item.moves.forEach(row=>{
      html+="<tr>";
      row.forEach(cell=>html+="<td>"+cell+"</td>");
      html+="</tr>";
    });
    html+="<tr>";
    let len=Math.min(item.moves.length,item.studentAnswers.length);
    for(let k=0;k<len;k++){
      let val=item.studentAnswers[k];
      let cls=val===item.total?"correct":"wrong";
      if(val===item.total) score++;
      html+="<td class='"+cls+"'>"+val+"</td>";
    }
    html+="</tr></table>";
    div.innerHTML=`<b>Q${i+1} - Score: ${score} / ${len}</b><br>`+html+"<hr>";
    container.appendChild(div);
  });
}
</script>
</body>
</html>
