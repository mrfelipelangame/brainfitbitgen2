<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainFitBit - Teacher Admin</title>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .nav-header { max-width: 900px; margin: 0 auto 20px; }
        .btn-home { background: var(--success); color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin: 10px 0 5px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; }
        .timer-config { display: flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 10px; border-radius: 6px; margin-top: 10px; }
        .timer-config input { width: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { border: 1px solid #e2e8f0; text-align: center; padding: 8px; }
        .correct { background: #dcfce7; color: #166534; font-weight: bold; border: 2px solid #10b981; }
        .wrong { background: #fee2e2; color: #991b1b; font-weight: bold; border: 2px solid #ef4444; }
        #generated-link { background: #f1f5f9; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 11px; word-break: break-all; margin-top: 10px; display: none; border: 1px dashed #cbd5e1; }
        .time-badge { background: var(--danger); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="nav-header"><button class="btn-home" onclick="window.location.href='index.html'">🏠 Home</button></div>
<div class="container">
    <h1>Teacher Dashboard</h1>
    <div class="grid">
        <section class="card">
            <h2>👤 Student</h2>
            <input type="text" id="new-name" placeholder="Name"><input type="email" id="new-email" placeholder="Email">
            <button onclick="register()">Add Student</button>
        </section>
        <section class="card">
            <h2>⚙️ Config</h2>
            <select id="student-sel"></select>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="cols" value="2" title="Cols">
                <input type="number" id="rows" value="5" title="Rows">
                <input type="number" id="qty" value="5" title="Qty">
            </div>
            <div class="timer-config"><input type="checkbox" id="timer-check" checked> <label for="timer-check">Enable Stopwatch</label></div>
        </section>
    </div>
    <button onclick="generateLink()">🔗 Generate Link</button>
    <div id="generated-link"></div>
    <hr>
    <h2>📊 Review Results</h2>
    <div class="card"><input type="file" id="json-file"><button style="background:#64748b" onclick="loadResults()">Analyze Results</button></div>
    <div id="results"></div>
</div>

<script>
    function register() {
        const n = document.getElementById("new-name").value, e = document.getElementById("new-email").value;
        let s = JSON.parse(localStorage.getItem("students") || "[]");
        s.push({name: n, email: e}); localStorage.setItem("students", JSON.stringify(s)); load();
    }
    function load() {
        const s = JSON.parse(localStorage.getItem("students") || "[]");
        const sel = document.getElementById("student-sel");
        sel.innerHTML = s.map(x => `<option value="${x.email}">${x.name}</option>`).join('');
    }
    function generateLink() {
        const sel = document.getElementById("student-sel");
        if(!sel.value) return alert("Select student");
        const name = sel.options[sel.selectedIndex].text;
        const url = `${window.location.href.replace('teacher.html','student.html')}?student=${encodeURIComponent(name)}&cols=${document.getElementById('cols').value}&rows=${document.getElementById('rows').value}&q=${document.getElementById('qty').value}&timer=${document.getElementById('timer-check').checked}`;
        document.getElementById("generated-link").innerText = url;
        document.getElementById("generated-link").style.display = "block";
        navigator.clipboard.writeText(url); alert("Link copied!");
    }
    function loadResults() {
        const file = document.getElementById("json-file").files[0];
        const reader = new FileReader();
        reader.onload = (e) => render(JSON.parse(e.target.result));
        reader.readAsText(file);
    }
    function render(data) {
        const res = document.getElementById("results");
        res.innerHTML = `<h3>⏱ Time spent: <span class="time-badge">${data[0].time || 'N/A'}</span></h3>`;
        data.forEach((item, idx) => {
            let table = "<table>";
            item.moves.forEach(row => { table += `<tr>${row.map(v => `<td>${v}</td>`).join('')}</tr>`; });
            const ans = item.studentAnswers[0];
            const isCorrect = ans == item.total;
            table += `<tr><td class="${isCorrect?'correct':'wrong'}">${ans || 'Empty'}</td></tr></table>`;
            res.innerHTML += `<div class="card"><strong>Q${idx+1}</strong> (Target: ${item.total}) ${table}</div>`;
        });
    }
    window.onload = load;
</script>
</body>
</html>
